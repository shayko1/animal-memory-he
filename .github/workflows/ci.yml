name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format -- --check
      - run: npm run lint
      - run: npm run test:run
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - run: npm run build
